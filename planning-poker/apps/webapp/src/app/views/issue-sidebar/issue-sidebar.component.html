<div
  [class.translate-x-full]="!isOpen()"
  [class.translate-x-0]="isOpen()"
  class="fixed z-100 top-20 bottom-32 right-0 w-100
            bg-background border-l border-b p-3 transition-transform duration-300 ease-in-out">

  <div class="flex flex-col w-full gap-2">
    <div class="flex flex-row items-center text-center gap-2 mb-3">
      <button z-button zType="ghost" (click)="closeSidebar()">
        <z-icon [zType]="'arrow-right'"/>
      </button>

      <h2>Ticket ansicht</h2>
    </div>

    <button z-button zType="destructive" (click)="add()">ADD</button>

    @for (issue of issues(); track issue.id) {
      <z-card [zTitle]="issue.title" [zDescription]="issue.status">
        <button z-button (click)="start(issue.id)">START</button>
      </z-card>
    }
  </div>
</div>
