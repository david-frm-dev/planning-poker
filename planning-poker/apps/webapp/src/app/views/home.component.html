<button z-button zType="outline" (click)="toggleTheme()" class="absolute top-5 right-5">
  <z-icon zType="dark-mode" zSize="xl"/>
</button>

<div class="min-h-screen flex flex-col items-center justify-center pb-10">
  <div class="mb-12 text-center">
    <h1 class="text-5xl font-black text-headline-text mb-4">Planning Poker</h1>
    <p class="text-gray-500 text-lg">Einfach. Ohne Werbung.</p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-4xl">
    <z-card>
      <h2 class="text-2xl font-bold mb-6">Neuen Raum erstellen</h2>

      <label class="block text-sm font-medium mb-4">Thema / Sprint Name</label>
      <input z-input [(ngModel)]="newRoomName" type="text" placeholder="z.B. März-Sprint"
             class="w-full px-4 rounded-xl h-12.5 text-base">

      <label class="block text-sm font-medium mt-6 mb-4">Kartendeck</label>
      <z-select class="w-full rounded-xl h-12.5 text-base" [(ngModel)]="selectedDeckId" (ngModelChange)="onDeckChange()">
        @for (deck of deckOptions; track deck.value) {
          <z-select-item [zValue]="deck.value">{{ deck.label }}</z-select-item>
        }
      </z-select>

      @if (selectedDeckId === 'custom') {
        <label class="block text-sm font-medium mt-4 mb-2">Karten (kommagetrennt)</label>
        <input z-input [(ngModel)]="customDeckInput" type="text"
               placeholder="z.B. XS, S, M, L, XL"
               class="w-full px-4 rounded-xl h-12.5 text-base">
      }

      <label class="flex items-center gap-3 mt-5 cursor-pointer select-none">
        <input type="checkbox" [(ngModel)]="calculateStats" class="w-4 h-4 accent-indigo-500 cursor-pointer">
        <span class="text-sm font-medium">Durchschnitt &amp; Median berechnen</span>
      </label>

      <button z-button zType="outline" (click)="createRoom()" [zDisabled]="isCreateDisabled()"
                class="w-full font-bold py-6 px-8 rounded-xl border-3 my-4">
        Raum öffnen
      </button>
    </z-card>


    <z-card>
      <h2 class="text-2xl font-bold mb-6">Raum beitreten</h2>

      <label class="block text-sm font-medium mb-4">6-stelliger Raum-Code</label>
      <input z-input [(ngModel)]="joinRoomId" appNumberOnly type="text" placeholder="123456" maxlength="6"
             class="w-full px-4 rounded-xl h-12.5 font-mono text-base">

      <button z-button zType="outline" (click)="joinRoom()" [zDisabled]="this.joinRoomId.length != 6"
              class="w-full font-bold py-6 px-8 rounded-xl border-3 my-4">
        Beitreten
      </button>
    </z-card>
  </div>
</div>
